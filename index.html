<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<meta name="theme-color" content="#0a0f1e"/>
<meta name="description" content="MyBudget — Personal Budget Tracker"/>
<title>MyBudget — Budget Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-192.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="MyBudget"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
[data-theme="dark"]{--bg:#0a0f1e;--s1:#111827;--s2:#1a2234;--s3:#232d42;--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--bdr:rgba(255,255,255,0.07)}
[data-theme="light"]{--bg:#f0f4f8;--s1:#ffffff;--s2:#f1f5f9;--s3:#e2e8f0;--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--bdr:rgba(0,0,0,0.08)}
:root{--acc:#6ee7b7;--acc2:#38bdf8;--acc3:#f472b6;--acc4:#fbbf24;--red:#f87171;--r:16px;--rs:10px}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .25s,color .25s}
#root{min-height:100vh}
.shell{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto}
.page{flex:1;padding:16px 16px 90px;overflow-y:auto}
/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;max-width:480px;margin:0 auto}
.topbar-logo{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;letter-spacing:-1px}
.topbar-logo span{color:var(--acc)}
.topbar-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#0a0f1e;cursor:pointer;overflow:hidden;border:2px solid var(--bdr);flex-shrink:0}
.topbar-avatar img{width:36px;height:36px;object-fit:cover;border-radius:50%}
/* BOTTOM NAV */
.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-around;padding:8px 4px 20px;z-index:100;transition:background .25s}
.ni{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 8px;border-radius:12px;transition:all .2s;border:none;background:none;color:var(--t3);flex:1;font-family:'DM Sans',sans-serif}
.ni.on{color:var(--acc)}
.ni svg{width:22px;height:22px;stroke-width:1.8}
.nl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.nadd{background:var(--acc);color:#0a0f1e!important;border-radius:50%;width:52px;height:52px;display:flex;align-items:center;justify-content:center;margin-top:-14px;box-shadow:0 4px 20px rgba(110,231,183,.4);flex:0 0 52px;border:3px solid var(--bg);cursor:pointer}
/* CARDS */
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:18px;margin-bottom:12px;transition:background .25s}
.card-sm{padding:14px 16px}
/* HERO */
.hero{background:linear-gradient(135deg,#0a1929 0%,#0d2137 50%,#091824 100%);border:1px solid rgba(110,231,183,.1);border-radius:20px;padding:20px 18px 18px;margin-bottom:12px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-60px;right:-40px;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(110,231,183,.06),transparent 70%);pointer-events:none}
.hero-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.45);font-weight:600;margin-bottom:6px}
.hero-bal{font-family:'Syne',sans-serif;font-size:42px;font-weight:800;color:var(--acc);letter-spacing:-2px;line-height:1;display:flex;align-items:center;gap:4px}
.hero-bal-sym{font-size:28px;margin-top:4px}
.hero-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px;margin-top:2px}
.hero-stats{display:flex;gap:8px}
.hero-stat{flex:1;background:rgba(255,255,255,.04);border-radius:10px;padding:10px 8px}
.hero-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.35);font-weight:700;margin-bottom:3px}
.hero-stat-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.hero-stat-val.inc{color:var(--acc)}
.hero-stat-val.exp{color:var(--red)}
.hero-stat-val.pln{color:var(--acc4)}
/* SECTION HEADERS */
.sec-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:4px}
.sec-hd-ico{font-size:16px}
.sec-hd-txt{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t2)}
/* INSIGHT */
.insight-card{background:linear-gradient(135deg,#0d1f3c,#0f1a2e);border:1px solid rgba(56,189,248,.12);border-radius:var(--r);padding:14px 16px;display:flex;gap:12px;align-items:flex-start;margin-bottom:8px}
[data-theme="light"] .insight-card{background:linear-gradient(135deg,#e8f4fd,#f0faff);border-color:rgba(56,189,248,.25)}
.insight-ico{font-size:22px;flex-shrink:0;margin-top:1px}
.insight-title{font-size:13px;font-weight:700;color:var(--acc2);margin-bottom:2px}
.insight-txt{font-size:13px;color:var(--t2);line-height:1.5}
/* YEARLY OVERVIEW */
.yearly-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:12px}
.yearly-title{display:flex;align-items:center;gap:6px;font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t2);margin-bottom:12px}
.yearly-stats{display:flex;gap:8px;margin-bottom:14px}
.yearly-stat{flex:1;background:var(--s2);border-radius:10px;padding:10px}
.yearly-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:700;margin-bottom:3px}
.yearly-stat-val{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
.ch{position:relative;height:180px}
/* MONTH TOGGLE */
.month-toggle{display:flex;gap:6px;background:var(--s2);border-radius:12px;padding:4px;margin-bottom:14px}
.mt-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:9px 8px;border-radius:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.mt-btn.on{background:var(--s3);color:var(--t1)}
.mt-btn-ico{font-size:14px}
/* SEGMENT */
.seg{display:flex;gap:4px;background:var(--s2);border-radius:10px;padding:4px;margin-bottom:14px}
.sb{flex:1;text-align:center;padding:9px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--t2);transition:all .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.sb.on{background:var(--s1);color:var(--t1);box-shadow:0 1px 4px rgba(0,0,0,.2)}
/* FORMS */
.fg{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.inp{width:100%;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);padding:12px 14px;color:var(--t1);font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:var(--t3)}
select.inp{appearance:none}
.inp-lg{font-size:28px;font-family:'Syne',sans-serif;font-weight:700;padding:14px;border-radius:14px}
.btn{width:100%;background:var(--acc);color:#0a0f1e;border:none;border-radius:var(--rs);padding:15px;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;transition:opacity .2s,transform .1s;letter-spacing:.3px}
.btn:hover{opacity:.9}.btn:active{transform:scale(.98)}.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ghost{background:transparent;border:1px solid var(--bdr);color:var(--t2)}
.btn-sm{padding:10px 18px;width:auto;border-radius:10px;font-size:14px}
.btn-red{background:var(--red);color:#fff}
.err{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);color:var(--red);border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:14px}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:2px}
.chip{padding:7px 13px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:4px}
.chip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}
/* TRANSACTION ROW */
.tx{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--bdr)}
.tx:last-child{border-bottom:none}
.txi{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.txn{flex:1;min-width:0}
.txname{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.txmeta{font-size:12px;color:var(--t2);margin-top:1px}
.txamt{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;flex-shrink:0}
.inc{color:var(--acc)}.exp{color:var(--red)}.pln{color:var(--acc4)}
.txdel{background:none;border:none;color:var(--t3);cursor:pointer;padding:5px;font-size:16px;flex-shrink:0;transition:color .15s;line-height:1}
.txdel:hover{color:var(--red)}
/* MODAL / DRAWER */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fi .2s}
.drw{background:var(--s1);border-radius:24px 24px 0 0;width:100%;max-width:480px;padding:20px 20px 40px;max-height:94vh;overflow-y:auto;animation:su .25s ease-out}
.hdl{width:44px;height:4px;background:var(--s3);border-radius:2px;margin:0 auto 20px}
.drw-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.drw-title{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
.drw-cancel{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:10px;border:1px solid var(--bdr);background:none;color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.ov-center{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;animation:fi .2s}
.modal{background:var(--s1);border:1px solid var(--bdr);border-radius:20px;padding:26px 22px;width:100%;max-width:360px;animation:pop .2s ease-out}
.modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px}
.modal-desc{font-size:13px;color:var(--t2);margin-bottom:18px;line-height:1.5}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
/* TOGGLE */
.trow{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--bdr)}
.trow:last-child{border-bottom:none}
.trow-info{flex:1}
.trow-lbl{font-size:14px;color:var(--t1);font-weight:500}
.trow-sub{font-size:12px;color:var(--t3);margin-top:2px}
.tog{width:46px;height:27px;background:var(--s3);border-radius:14px;position:relative;cursor:pointer;transition:background .2s;border:none;flex-shrink:0}
.tog.on{background:var(--acc)}
.tog::after{content:'';position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{left:22px}
/* PROFILE */
.pav-wrap{position:relative;width:88px;margin:0 auto 12px;cursor:pointer}
.pav{width:88px;height:88px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:flex;align-items:center;justify-content:center;font-size:32px;overflow:hidden;border:3px solid rgba(110,231,183,.3)}
.pav img{width:88px;height:88px;object-fit:cover;display:block;border-radius:50%}
.pav-cam{position:absolute;bottom:2px;right:2px;width:28px;height:28px;border-radius:50%;background:#0a0f1e;border:2px solid var(--acc);display:flex;align-items:center;justify-content:center;font-size:13px}
.pname{text-align:center;font-family:'Syne',sans-serif;font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.pemail{text-align:center;color:var(--t2);font-size:13px;margin-bottom:20px}
.prof-stats{display:flex;gap:10px;margin-bottom:16px}
.prof-stat{flex:1;background:var(--s2);border-radius:12px;padding:14px;text-align:center}
.prof-stat-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);font-weight:700;margin-bottom:4px}
.prof-stat-val{font-family:'Syne',sans-serif;font-size:20px;font-weight:700}
/* MENU ITEMS */
.mi{display:flex;align-items:center;gap:14px;padding:13px 0;border-bottom:1px solid var(--bdr);cursor:pointer}
.mi:last-child{border-bottom:none}
.mi-ico{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.mi-info{flex:1}
.mi-lbl{font-size:14px;font-weight:500}
.mi-sub{font-size:12px;color:var(--t3);margin-top:1px}
.mi-arr{color:var(--t3);font-size:18px;font-weight:300}
/* SECTION LABEL */
.slbl{font-family:'Syne',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--t3);margin-bottom:8px;padding:0 2px}
/* PAYDAY TAGS */
.pd-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.pd-tag{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--s3);font-size:13px;font-weight:600}
.pd-tag-del{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0;line-height:1}
.pd-tag-del:hover{color:var(--red)}
/* GOALS */
.goal-card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;margin-bottom:10px}
.goal-top{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.goal-ico{width:44px;height:44px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:21px;flex-shrink:0}
.goal-info{flex:1;min-width:0}
.goal-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.goal-meta{font-size:12px;color:var(--t2);margin-top:2px}
.goal-amts{display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-top:5px}
.goal-amts span:last-child{color:var(--t1);font-weight:600}
.pbar{height:6px;background:var(--s3);border-radius:3px;overflow:hidden;margin-top:8px}
.pfill{height:100%;border-radius:3px;transition:width .6s ease}
/* PLANNER */
.bill-card{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--bdr)}
.bill-card:last-child{border-bottom:none}
/* PAGE HEADER */
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ptitle{font-family:'Syne',sans-serif;font-size:22px;font-weight:700}
.padd{font-size:13px;color:var(--acc);font-weight:600;cursor:pointer;background:none;border:none;font-family:'DM Sans',sans-serif;padding:6px 12px;border-radius:8px;border:1px solid rgba(110,231,183,.2)}
/* LOG */
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
.filter-row::-webkit-scrollbar{display:none}
.fcip{padding:7px 14px;border-radius:20px;border:1px solid var(--bdr);background:var(--s2);color:var(--t2);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:'DM Sans',sans-serif;flex-shrink:0}
.fcip.on{background:var(--acc);border-color:var(--acc);color:#0a0f1e;font-weight:700}
.dg-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);padding:10px 2px 5px}
/* PIN */
.pin-dots{display:flex;gap:14px;justify-content:center;margin:16px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--t3);transition:all .15s}
.pin-dot.filled{background:var(--acc);border-color:var(--acc)}
.pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto}
.pin-key{background:var(--s2);border:1px solid var(--bdr);border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-size:22px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;color:var(--t1)}
.pin-key:active{transform:scale(.93);background:var(--s3)}
.pin-key.del{font-size:16px;color:var(--t2)}
/* EMPTY */
.empty{text-align:center;padding:40px 20px;color:var(--t2)}
.eico{font-size:40px;margin-bottom:12px}
.etxt{font-size:14px;line-height:1.6}
/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.bdg-red{background:rgba(248,113,113,.12);color:var(--red)}
.bdg-grn{background:rgba(110,231,183,.12);color:var(--acc)}
.bdg-yel{background:rgba(251,191,36,.12);color:var(--acc4)}
/* MISC */
.col2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.spin{display:inline-block;width:16px;height:16px;border:2px solid rgba(10,15,30,.3);border-top-color:#0a0f1e;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:0;height:0}
/* SETUP SCREEN */
.setup-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 20px;background:radial-gradient(ellipse at 60% 0%,#1a2e4a,#0a0f1e 60%)}
.setup-logo{font-family:'Syne',sans-serif;font-size:40px;font-weight:800;letter-spacing:-1.5px;margin-bottom:8px}
.setup-logo span{color:var(--acc)}
.setup-tag{color:#94a3b8;font-size:14px;margin-bottom:36px;text-align:center}
.setup-card{background:#111827;border:1px solid rgba(255,255,255,0.06);border-radius:22px;padding:28px 22px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.5)}
</style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useMemo, useCallback } = React;
const e = React.createElement;

// ── PWA ───────────────────────────────────────────────────────────
let _pwaPrompt = null;
window.addEventListener('beforeinstallprompt', ev => { ev.preventDefault(); _pwaPrompt = ev; });

// ── OFFLINE STORAGE ───────────────────────────────────────────────
const DB_KEY   = 'mybudget_data';
const PREF_KEY = 'mybudget_prefs';

const db = {
  load: () => { try { const r = localStorage.getItem(DB_KEY); return r ? JSON.parse(r) : db.blank(); } catch { return db.blank(); } },
  save: d  => { try { localStorage.setItem(DB_KEY, JSON.stringify(d)); } catch(e) { console.error(e); } },
  blank: () => ({ income:[], expenses:[], planned:[], goals:[], paydays:[] })
};
const pref = {
  get: k => { try { const r = localStorage.getItem(PREF_KEY); return r ? JSON.parse(r)[k] ?? null : null; } catch { return null; } },
  set: (k,v) => { try { const r = localStorage.getItem(PREF_KEY); const o = r?JSON.parse(r):{}; o[k]=v; localStorage.setItem(PREF_KEY, JSON.stringify(o)); } catch {} }
};
const applyTheme = t => { document.documentElement.setAttribute('data-theme', t); pref.set('theme', t); };

// ── UTILS ─────────────────────────────────────────────────────────
const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
const fmt  = n => '₱' + new Intl.NumberFormat('en-PH',{minimumFractionDigits:0,maximumFractionDigits:0}).format(n||0);

function nextPayday(paydays) {
  if (!paydays?.length) return { days:null, date:null };
  const now=new Date(), m=now.getMonth(), y=now.getFullYear();
  let bd=9999, best=null;
  for (const d of paydays) {
    let dt = new Date(y, m, d);
    if (dt <= now) dt = new Date(y, m+1, d);
    const diff = Math.ceil((dt-now)/864e5);
    if (diff < bd) { bd=diff; best=dt; }
  }
  return { days:bd, date:best };
}

function getInsights(data) {
  const { income, expenses, planned, paydays } = data;
  const now = new Date();
  const mExp = expenses.filter(ex=>{ const d=new Date(ex.date); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear(); });
  const totI = income.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const totE = expenses.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const totP = planned.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const rem  = totI-totE-totP;
  const { days } = nextPayday(paydays);
  const catTot={};
  mExp.forEach(ex=>{ catTot[ex.category]=(catTot[ex.category]||0)+parseFloat(ex.amount||0); });
  const topCat = Object.entries(catTot).sort((a,b)=>b[1]-a[1])[0];
  const savRate = totI>0?((totI-totE)/totI)*100:0;
  const out=[];
  if (savRate>=20) out.push({icon:'🎉',title:'Great Savings Rate!',text:`You're saving ${savRate.toFixed(0)}% of your income. Keep it up!`});
  else if (savRate>0&&totI>0) out.push({icon:'💡',title:'Boost Your Savings',text:`Saving ${savRate.toFixed(0)}% right now. Try cutting one expense to reach 20%.`});
  if (topCat) out.push({icon:'🔍',title:`Top Spend: ${topCat[0]}`,text:`${fmt(topCat[1])} on ${topCat[0]} this month.${topCat[1]>totI*0.3?' That\'s over 30% of income!':''}`});
  if (days!==null&&days>0&&rem>0) out.push({icon:'📅',title:'Daily Budget',text:`You can spend ${fmt(rem/days)}/day until payday in ${days} days.`});
  if (rem<0) out.push({icon:'🚨',title:'Over Budget!',text:`You're ${fmt(Math.abs(rem))} over budget. Consider cutting non-essential expenses.`});
  const urgent = planned.filter(p=>Math.ceil((new Date(p.due_date)-now)/864e5)<=7&&Math.ceil((new Date(p.due_date)-now)/864e5)>=0);
  if (urgent.length>0) out.push({icon:'⚠️',title:'Bills Due Soon',text:`${urgent.length} bill${urgent.length>1?'s':''} due within 7 days totalling ${fmt(urgent.reduce((s,p)=>s+parseFloat(p.amount||0),0))}.`});
  if (!out.length) out.push({icon:'✨',title:'All Good!',text:'Add transactions to unlock personalised spending insights here.'});
  return out;
}

// ── PIN MODAL ─────────────────────────────────────────────────────
function PinModal({ mode, onSuccess, onCancel }) {
  // mode: 'set' | 'verify' | 'change'
  const initStep = mode==='set'?'enter':mode==='change'?'verify-old':'verify';
  const [step, setStep] = useState(initStep);
  const [pin, setPin] = useState('');
  const [confirm, setConfirm] = useState('');
  const [err, setErr] = useState('');

  const titles = {
    'verify':     { t:'Enter PIN', d:'Enter your 4-digit PIN to continue.' },
    'verify-old': { t:'Current PIN', d:'Enter your existing PIN first.' },
    'enter':      { t: mode==='change'?'New PIN':'Create PIN', d:'Choose a 4-digit PIN.' },
    'confirm':    { t:'Confirm PIN', d:'Re-enter your new PIN.' }
  };
  const { t, d } = titles[step]||{t:'',d:''};
  const current = step==='confirm' ? confirm : pin;

  const handleKey = k => {
    if (step==='verify') {
      const np = pin+k; if (np.length>4) return; setPin(np);
      if (np.length===4) {
        const saved = pref.get('pin');
        if (np===saved) setTimeout(()=>onSuccess(),100);
        else setTimeout(()=>{ setPin(''); setErr('Incorrect PIN.'); }, 300);
      }
    } else if (step==='verify-old') {
      const np=pin+k; if (np.length>4) return; setPin(np);
      if (np.length===4) {
        const saved=pref.get('pin');
        if (np===saved) setTimeout(()=>{ setPin(''); setErr(''); setStep('enter'); },200);
        else setTimeout(()=>{ setPin(''); setErr('Incorrect PIN.'); },300);
      }
    } else if (step==='enter') {
      const np=pin+k; if (np.length>4) return; setPin(np);
      if (np.length===4) setTimeout(()=>setStep('confirm'),150);
    } else if (step==='confirm') {
      const np=confirm+k; if (np.length>4) return; setConfirm(np);
      if (np.length===4) {
        if (np===pin) { pref.set('pin',pin); setTimeout(()=>onSuccess(),100); }
        else setTimeout(()=>{ setConfirm(''); setErr('PINs do not match.'); setStep('enter'); setPin(''); },300);
      }
    }
  };
  const del = () => {
    if (step==='confirm') setConfirm(c=>c.slice(0,-1));
    else setPin(p=>p.slice(0,-1));
  };

  return e('div', {className:'ov-center'},
    e('div', {className:'modal'},
      e('div', {className:'modal-title'}, t),
      e('div', {className:'modal-desc'}, d),
      err && e('div', {className:'err',style:{marginBottom:10}}, err),
      e('div', {className:'pin-dots'},
        [0,1,2,3].map(i=>e('div',{key:i,className:'pin-dot '+(i<current.length?'filled':'')}))
      ),
      e('div', {className:'pin-keypad'},
        ['1','2','3','4','5','6','7','8','9','','0','del'].map((k,i)=>{
          if (k==='') return e('div',{key:i});
          return e('button',{key:i,className:'pin-key '+(k==='del'?'del':''),onClick:()=>k==='del'?del():handleKey(k)}, k==='del'?'⌫':k);
        })
      ),
      e('button',{className:'btn btn-ghost',style:{marginTop:16},onClick:onCancel},'Cancel')
    )
  );
}

// ── ADD TRANSACTION DRAWER ────────────────────────────────────────
function AddDrawer({ onClose, onSave }) {
  const [type, setType] = useState('expense');
  const [amount, setAmount] = useState('');
  const [cat, setCat] = useState('Food');
  const [date, setDate] = useState(today());
  const [notes, setNotes] = useState('');
  // planned extra
  const [planName, setPlanName] = useState('');
  const [dueDate, setDueDate] = useState(today());
  const [recurring, setRecurring] = useState(false);
  const [err, setErr] = useState('');

  const save = () => {
    const amt = parseFloat(amount);
    if (!amount||isNaN(amt)||amt<=0) { setErr('Enter a valid amount.'); return; }
    if (type==='planned' && !planName.trim()) { setErr('Enter a bill name.'); return; }
    const base = { id:uid(), amount:amt, created_at:new Date().toISOString() };
    if (type==='expense')  onSave('expenses', {...base, note:notes, category:cat, date});
    if (type==='income')   onSave('income',   {...base, source:notes, date});
    if (type==='planned')  onSave('planned',  {...base, name:planName.trim(), category:cat, due_date:dueDate, recurring});
    onClose();
  };

  return e('div',{className:'ov',onClick:ev=>ev.target.className==='ov'&&onClose()},
    e('div',{className:'drw'},
      e('div',{className:'hdl'}),
      e('div',{className:'drw-head'},
        e('div',{className:'drw-title'},'Add Transaction'),
        e('button',{className:'drw-cancel',onClick:onClose}, '✕ Cancel')
      ),
      e('div',{className:'seg'},
        e('button',{className:'sb '+(type==='expense'?'on':''),onClick:()=>setType('expense')},'Expense'),
        e('button',{className:'sb '+(type==='income'?'on':''),onClick:()=>setType('income')},'Income'),
        e('button',{className:'sb '+(type==='planned'?'on':''),onClick:()=>setType('planned')},'Planned')

      err && e('div',{className:'err'},err),
      e('div',{className:'fg'},
        e('label',{className:'lbl'},'Amount'),
        e('input',{className:'inp inp-lg',type:'number',placeholder:'0.00',value:amount,onChange:ev=>setAmount(ev.target.value),inputMode:'decimal',autoFocus:true})
      ),
      type==='planned' && e('div',{className:'fg'},
        e('label',{className:'lbl'},'Bill Name'),
        e('input',{className:'inp',type:'text',placeholder:'e.g. Globe Postpaid',value:planName,onChange:ev=>setPlanName(ev.target.value)})
      ),
      (type==='expense') && e('div',{className:'fg'},

        e('div',{className:'chips'},
          CATS.map(c=>e('div',{key:c,className:'chip '+(cat===c?'on':''),onClick:()=>setCat(c)}, CAT[c].e+' '+c))
        )

          e('label',{className:'lbl'},'Date'),
          e('input',{className:'inp',type:'date',value:type==='planned'?dueDate:date,onChange:ev=>type==='planned'?setDueDate(ev.target.value):setDate(ev.target.value)})
        ),
        e('div',{className:'fg'},
          e('label',{className:'lbl'},'Notes'),
          e('input',{className:'inp',type:'text',placeholder:'Optional',value:notes,onChange:ev=>setNotes(ev.target.value)})

      ),
      type==='planned' && e('div',{className:'trow',style:{marginBottom:14}},
        e('span',{className:'trow-lbl'},'Recurring monthly'),

function HomeScreen({ data }) {
  const { income, expenses, planned, paydays } = data;
  const [viewMode, setViewMode] = useState('current');
  const [rangeMonth, setRangeMonth] = useState(()=>{ const n=new Date(); return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0'); });

  const barChart = useRef(null);

  const [sY, sM] = viewMode==='range'
    ? [parseInt(rangeMonth.split('-')[0]), parseInt(rangeMonth.split('-')[1])-1]
    : [now.getFullYear(), now.getMonth()];

  const inMonth=(ds,y,m)=>{ const d=new Date(ds); return d.getFullYear()===y&&d.getMonth()===m; };
  const mI = income.filter(x=>inMonth(x.date,sY,sM));
  const mE = expenses.filter(x=>inMonth(x.date,sY,sM));
  const mP = planned.filter(x=>inMonth(x.due_date,sY,sM));
  const totI=mI.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const totE=mE.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const totP=mP.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const bal = totI-totE-totP;
  const {days} = nextPayday(paydays);

  const yearMonths = Array.from({length:12},(_,i)=>{
    const lbl=new Date(now.getFullYear(),i,1).toLocaleDateString('en-PH',{month:'short'});
    const inc=income.filter(x=>inMonth(x.date,now.getFullYear(),i)).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    const exp=expenses.filter(x=>inMonth(x.date,now.getFullYear(),i)).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    const pln=planned.filter(x=>inMonth(x.due_date,now.getFullYear(),i)).reduce((s,x)=>s+parseFloat(x.amount||0),0);
    return {lbl,inc,exp,pln};
  });
  const yI=yearMonths.reduce((s,m)=>s+m.inc,0);

  useEffect(()=>{

    if (barChart.current) barChart.current.destroy();

      type:'bar',
      data:{
        labels:yearMonths.map(m=>m.lbl),
        datasets:[

          {label:'Spent', data:yearMonths.map(m=>m.exp),backgroundColor:'rgba(248,113,113,.7)',borderRadius:4,borderSkipped:false},
          {label:'Planned',data:yearMonths.map(m=>m.pln),backgroundColor:'rgba(251,191,36,.5)',borderRadius:4,borderSkipped:false}

      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{
        x:{ticks:{color:'#475569',font:{size:10}},grid:{display:false}},
        y:{ticks:{color:'#475569',font:{size:10},callback:v=>'₱'+v.toLocaleString()},grid:{color:'rgba(255,255,255,0.04)'}}
      }}
    });
    return ()=>{ if (barChart.current) barChart.current.destroy(); };
  }, [JSON.stringify(yearMonths)]);

  const insights = getInsights(data);
  const monthLabel = viewMode==='range'
    ? new Date(sY,sM,1).toLocaleDateString('en-US',{month:'long',year:'numeric'})

// ── PLANNER SCREEN ────────────────────────────────────────────────
function PlannerScreen({ data, onDelete }) {
  const { planned } = data;
  const now = new Date();
  const sorted = [...planned].sort((a,b)=>new Date(a.due_date)-new Date(b.due_date));
  const upcoming = sorted.filter(p=>new Date(p.due_date)>=now);
  const past     = sorted.filter(p=>new Date(p.due_date)<now);

  const renderBill = p => {
    const ci = CAT[p.category]||CAT.Other;
    const daysLeft = Math.ceil((new Date(p.due_date)-now)/864e5);
    const urgent = daysLeft>=0&&daysLeft<=7;
    return e('div',{key:p.id,className:'bill-card'},
      e('div',{className:'txi',style:{background:ci.bg,width:42,height:42,borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',fontSize:19,flexShrink:0}},ci.e),
      e('div',{style:{flex:1,minWidth:0}},
        e('div',{className:'txname'},p.name),
        e('div',{className:'txmeta'},`Due ${fmtF(p.due_date)}${p.recurring?' · Recurring':''}`)
      ),
      e('div',{style:{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:3}},
        e('div',{className:'txamt pln'},fmt(p.amount)),
        urgent&&daysLeft>=0&&e('span',{className:'bdg bdg-red'},daysLeft===0?'Today':`${daysLeft}d`)
      ),
      e('button',{className:'txdel',onClick:()=>onDelete('planned',p.id)},'×')
    );
  };

  const totalPlanned = planned.reduce((s,p)=>s+parseFloat(p.amount||0),0);

  return e('div',null,
    e('div',{className:'ph'},e('div',{className:'ptitle'},'Planner')),
    e('div',{className:'card card-sm',style:{marginBottom:12}},
      e('div',{style:{fontSize:12,color:'var(--t2)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.5px',fontWeight:700,fontSize:10}},'Total Planned'),
      e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:26,fontWeight:700,color:'var(--acc4)'}},fmt(totalPlanned))
    ),
    upcoming.length>0 && e('div',null,
      e('div',{className:'slbl'},'Upcoming'),
      e('div',{className:'card card-sm'},upcoming.map(renderBill))
    ),
    past.length>0 && e('div',null,
      e('div',{className:'slbl',style:{color:'var(--t3)'}},'Past Due'),
      e('div',{className:'card card-sm'},past.map(renderBill))
    ),
    planned.length===0 && e('div',{className:'empty'},
      e('div',{className:'eico'},'📋'),
      e('div',{className:'etxt'},'No planned bills yet.\nTap + to add rent, subscriptions, and utilities.')
    )
  );
}

  const doContrib = () => {

  return e('div',null,

        ),
        e('div',{className:'pbar'},e('div',{className:'pfill',style:{width:pct+'%',background:g.color||'var(--acc)'}})),
        e('div',{className:'goal-amts'},

        },'+ Add Savings')
      );
    }),
    showAdd && e('div',{className:'ov',onClick:ev=>ev.target.className==='ov'&&setShowAdd(false)},
      e('div',{className:'drw'},
        e('div',{className:'hdl'}),
        e('div',{className:'drw-head'},
          e('div',{className:'drw-title'},'New Goal'),
          e('button',{className:'drw-cancel',onClick:()=>setShowAdd(false)},'✕ Cancel')
        ),
        e('div',{className:'fg'},
          e('label',{className:'lbl'},'Goal Name'),
          e('input',{className:'inp',type:'text',placeholder:'e.g. New Laptop',value:gName,onChange:ev=>setGName(ev.target.value),autoFocus:true})
        ),
        e('div',{className:'fg'},
          e('label',{className:'lbl'},'Target Amount (₱)'),
          e('input',{className:'inp',type:'number',placeholder:'0',value:gTarget,onChange:ev=>setGTarget(ev.target.value),inputMode:'decimal'})
        ),

          e('div',{style:{display:'flex',flexWrap:'wrap',gap:8}},
            GOAL_ICONS.map(ic=>e('button',{key:ic,onClick:()=>setGIcon(ic),style:{fontSize:22,padding:'6px 8px',borderRadius:10,border:`2px solid ${gIcon===ic?'var(--acc)':'var(--bdr)'}`,background:'var(--s2)',cursor:'pointer'}},''+ic))
          )

        e('button',{className:'btn btn-ghost',onClick:()=>setContrib(null)},'Cancel')
      )
    )
  );
}

// ── LOG SCREEN ────────────────────────────────────────────────────
function LogScreen({ data, onDelete }) {
  const { income, expenses } = data;
  const [filter, setFilter] = useState('all');
  const [search, setSearch] = useState('');

  const all = useMemo(()=>[
    ...income.map(x=>({...x,type:'income'})),
    ...expenses.map(x=>({...x,type:'expense'}))
  ].sort((a,b)=>new Date(b.date)-new Date(a.date)), [income,expenses]);

  const filtered = useMemo(()=>all.filter(tx=>{
    if (filter==='income'&&tx.type!=='income') return false;
    if (filter==='expense'&&tx.type!=='expense') return false;
    if (!['all','income','expense'].includes(filter)&&tx.category!==filter) return false;
    if (search) {
      const q=search.toLowerCase();
      return (tx.note||'').toLowerCase().includes(q)||(tx.source||'').toLowerCase().includes(q)||(tx.category||'').toLowerCase().includes(q);
    }
    return true;
  }), [all,filter,search]);

  const grouped = useMemo(()=>{
    const g={};
    filtered.forEach(tx=>{ const k=tx.date; if(!g[k])g[k]=[]; g[k].push(tx); });
    return Object.entries(g).sort((a,b)=>new Date(b[0])-new Date(a[0]));
  },[filtered]);

  return e('div',null,
    e('div',{className:'ph'},e('div',{className:'ptitle'},'Log')),
    e('input',{className:'inp',style:{marginBottom:10},placeholder:'🔍 Search…',value:search,onChange:ev=>setSearch(ev.target.value)}),
    e('div',{className:'filter-row'},
      [['all','All'],['income','Income'],['expense','Expenses'],...CATS.map(c=>[c,c])].map(([v,l])=>
        e('button',{key:v,className:'fcip '+(filter===v?'on':''),onClick:()=>setFilter(v)},l)
      )
    ),
    grouped.length===0&&e('div',{className:'empty'},
      e('div',{className:'eico'},'🔍'),
      e('div',{className:'etxt'},'No transactions found.')
    ),
    grouped.map(([date,txs])=>
      e('div',{key:date},
        e('div',{className:'dg-lbl'},fmtF(date)),
        e('div',{className:'card card-sm'},
          txs.map(tx=>{
            const isI=tx.type==='income';
            const ci=CAT[isI?'Savings':tx.category]||CAT.Other;
            return e('div',{key:tx.id,className:'tx'},
              e('div',{className:'txi',style:{background:ci.bg}},ci.e),
              e('div',{className:'txn'},
                e('div',{className:'txname'},tx.note||tx.source||'Transaction'),
                e('div',{className:'txmeta'},isI?'Income':(tx.category||'Other'))
              ),
              e('div',{className:'txamt '+(isI?'inc':'exp')},(isI?'+':'-')+fmt(tx.amount)),
              e('button',{className:'txdel',onClick:()=>onDelete(isI?'income':'expenses',tx.id)},'×')
            );
          })
        )
      )
    )
  );
}

// ── PROFILE SCREEN ────────────────────────────────────────────────
function ProfileScreen({ data, onUpdate, onClearTx, onSignOut }) {
  const [theme, setTheme_] = useState(()=>pref.get('theme')||'dark');
  const [name, setName]     = useState(()=>pref.get('display_name')||'');
  const [editName, setEditName] = useState(false);
  const [pdInput, setPdInput]   = useState('');
  const [showPin, setShowPin]   = useState(null); // 'set'|'verify'|'change'|'clear-verify'
  const [photoSrc, setPhotoSrc] = useState(()=>pref.get('photo')||null);
  const fileRef = useRef(null);
  const avatarRef = useRef(null);

  const toggleTheme = () => {
    const nt = theme==='dark'?'light':'dark';
    applyTheme(nt); setTheme_(nt);
  };

  const addPayday = () => {
    const d = parseInt(pdInput);
    if (isNaN(d)||d<1||d>31) return;
    if ((data.paydays||[]).includes(d)) return;
    onUpdate({ paydays:[...(data.paydays||[]),d].sort((a,b)=>a-b) });
    setPdInput('');
  };
  const removePayday = d => onUpdate({ paydays:(data.paydays||[]).filter(x=>x!==d) });

  const handlePhoto = ev => {
    const file=ev.target.files[0]; if (!file) return;
    const reader=new FileReader();
    reader.onload=e=>{ pref.set('photo',e.target.result); setPhotoSrc(e.target.result); };
    reader.readAsDataURL(file);
  };

  const syncRefresh = () => { window.location.reload(); };

  const exportData = () => {
    const blob=new Blob([JSON.stringify(db.load(),null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download=`mybudget-backup-${today()}.json`; a.click();
    URL.revokeObjectURL(url);
  };

  const hasPin = !!pref.get('pin');
  const totI = data.income.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const totE = data.expenses.reduce((s,x)=>s+parseFloat(x.amount||0),0);
  const initials = name ? name[0].toUpperCase() : 'U';

  return e('div',null,
    // Avatar
    e('div',{className:'pav-wrap',onClick:()=>fileRef.current.click()},
      e('div',{className:'pav'},
        photoSrc ? e('img',{src:photoSrc,alt:'avatar'}) : e('span',{style:{fontFamily:'Syne,sans-serif',fontWeight:700,fontSize:32,color:'#0a0f1e'}},initials)
      ),
      e('div',{className:'pav-cam'},'📷')
    ),
    e('input',{ref:fileRef,type:'file',accept:'image/*',style:{display:'none'},onChange:handlePhoto}),
    // Name
    editName
      ? e('div',{style:{display:'flex',gap:8,alignItems:'center',justifyContent:'center',marginBottom:4}},
          e('input',{className:'inp',style:{maxWidth:220,textAlign:'center'},value:name,onChange:ev=>setName(ev.target.value),autoFocus:true}),
          e('button',{className:'btn btn-sm',style:{width:'auto'},onClick:()=>{ pref.set('display_name',name); setEditName(false); }},'✓')
        )
      : e('div',{className:'pname',onClick:()=>setEditName(true)},name||'Your Name',' ✏️'),
    // Income / Spent summary
    e('div',{className:'prof-stats'},
      e('div',{className:'prof-stat'},
        e('div',{className:'prof-stat-lbl'},'Income'),
        e('div',{className:'prof-stat-val inc'},fmt(totI))
      ),
      e('div',{className:'prof-stat'},
        e('div',{className:'prof-stat-lbl'},'Spent'),
        e('div',{className:'prof-stat-val exp'},fmt(totE))
      )
    ),
    // Appearance
    e('div',{className:'slbl'},'Appearance'),
    e('div',{className:'card card-sm',style:{marginBottom:12}},
      e('div',{className:'trow'},
        e('div',{className:'trow-info'},
          e('div',{className:'trow-lbl'},'🌙 Dark Mode'),
          e('div',{className:'trow-sub'},theme==='dark'?'Switch to light':'Switch to dark')
        ),
        e('button',{className:'tog '+(theme==='dark'?'on':''),onClick:toggleTheme})
      )
    ),
    // Payday Schedule
    e('div',{className:'slbl'},'Payday Schedule'),
    e('div',{className:'card card-sm',style:{marginBottom:12}},
      e('div',{className:'slbl',style:{marginBottom:6}},'Add Payday (Day of Month)'),
      e('div',{style:{display:'flex',gap:8}},
        e('input',{className:'inp',style:{flex:1},type:'number',placeholder:'e.g. 15',value:pdInput,onChange:ev=>setPdInput(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&addPayday(),inputMode:'numeric',min:1,max:31}),
        e('button',{className:'btn btn-sm',style:{width:'auto',flex:'0 0 auto'},onClick:addPayday},'Add')
      ),
      (data.paydays||[]).length>0 && e('div',{className:'pd-tags'},
        (data.paydays||[]).map(d=>
          e('div',{key:d,className:'pd-tag'},
            `Day ${d}`,
            e('button',{className:'pd-tag-del',onClick:()=>removePayday(d)},'×')
          )
        )
      )
    ),
    // Data & Security
    e('div',{className:'slbl'},'Data & Security'),
    e('div',{className:'card card-sm',style:{marginBottom:12}},
      e('div',{className:'mi',onClick:()=>setShowPin(hasPin?'clear-verify':'set-clear')},
        e('div',{className:'mi-ico',style:{background:'rgba(248,113,113,.1)'}},'🗑️'),
        e('div',{className:'mi-info'},
          e('div',{className:'mi-lbl',style:{color:'var(--red)'}},'Clear Transactions'),
          e('div',{className:'mi-sub'},'Manage & delete transactions (PIN protected)')
        ),
        e('span',{className:'mi-arr',style:{color:'var(--red)'}},'›')
      ),
      e('div',{className:'mi',onClick:()=>setShowPin(hasPin?'change':'set')},
        e('div',{className:'mi-ico',style:{background:'rgba(251,191,36,.1)'}},'🔑'),
        e('div',{className:'mi-info'},
          e('div',{className:'mi-lbl'},hasPin?'Change PIN':'Set PIN'),
          e('div',{className:'mi-sub'},hasPin?'Verify current PIN, then set new one':'Set a PIN to protect your data')
        ),
        e('span',{className:'mi-arr'},'›')
      ),
    ),
    // PIN modals
    showPin==='set' && e(PinModal,{mode:'set',
      onSuccess:()=>setShowPin(null),
      onCancel:()=>setShowPin(null)
    }),
    showPin==='change' && e(PinModal,{mode:'change',
      onSuccess:()=>setShowPin(null),
      onCancel:()=>setShowPin(null)
    }),
    (showPin==='clear-verify'||showPin==='set-clear') && e('div',{className:'ov-center'},
      e('div',{className:'modal'},
        e('div',{className:'modal-title'},'⚠️ Clear Transactions'),
        e('div',{className:'modal-desc'},'This will permanently delete ALL your transactions, planned bills, and goals. This cannot be undone.'),
        e('button',{className:'btn btn-red',style:{marginBottom:8},onClick:()=>{
          if (hasPin && showPin==='clear-verify') { setShowPin('clear-pin-check'); return; }
          onClearTx(); setShowPin(null);
        }},hasPin&&showPin==='clear-verify'?'Continue (PIN required)':'Yes, Delete Everything'),
        e('button',{className:'btn btn-ghost',onClick:()=>setShowPin(null)},'Cancel')
      )
    ),
    showPin==='clear-pin-check' && e(PinModal,{mode:'verify',
      onSuccess:()=>{ onClearTx(); setShowPin(null); },
      onCancel:()=>setShowPin(null)
    })
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────
function App() {
  const [ready, setReady]       = useState(false);
  const [firstRun, setFirstRun] = useState(false);
  const [data, setData]         = useState(null);
  const [tab, setTab]           = useState('home');
  const [showAdd, setShowAdd]   = useState(false);
  const [showSignOut, setShowSignOut] = useState(false);

  useEffect(()=>{
    const t = pref.get('theme')||'dark';
    applyTheme(t);
    const loaded = db.load();
    setData(loaded);
    const hasName = pref.get('display_name');
    const hasData = loaded.income.length>0||loaded.expenses.length>0||loaded.planned.length>0;
    if (!hasName&&!hasData) setFirstRun(true);
    setReady(true);
  },[]);

  const save = next => { db.save(next); setData({...next}); };

  const handleSave = (key, item) => {
    save({...data, [key]:[item,...(data[key]||[])]});
  };
  const handleDelete = (key, id) => {
    save({...data, [key]:(data[key]||[]).filter(x=>x.id!==id)});
  };
  const handleContrib = (goalId, amt) => {
    save({...data, goals:data.goals.map(g=>g.id===goalId?{...g,current_amount:(g.current_amount||0)+amt}:g)});
  };
  const handleUpdate = updates => { save({...data,...updates}); };
  const handleClearTx = () => { save({...db.blank(), paydays:data.paydays||[]}); };
  const handleSignOut = () => {
    // In offline mode "sign out" = reset to setup screen
    pref.set('display_name',''); pref.set('photo',null);
    save(db.blank()); setFirstRun(true); setShowSignOut(false);
  };

  if (!ready||!data) return e('div',{style:{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'var(--bg)'}},
    e('div',{style:{fontFamily:'Syne,sans-serif',fontSize:36,fontWeight:800}},'My',e('span',{style:{color:'var(--acc)'}},'Budget'))
  );

  if (firstRun) return e(SetupScreen,{onDone:name=>{ if(name) pref.set('display_name',name); setFirstRun(false); }});

  const name = pref.get('display_name')||'';
  const photo = pref.get('photo');
  const initials = name?name[0].toUpperCase():'U';

  const pages = {
    home:    e(HomeScreen,    {data}),
    planner: e(PlannerScreen, {data, onDelete:handleDelete}),
    goals:   e(GoalsScreen,   {data, onAddGoal:g=>handleSave('goals',g), onDelete:handleDelete, onContribute:handleContrib}),
    log:     e(LogScreen,     {data, onDelete:handleDelete}),
    profile: e(ProfileScreen, {data, onUpdate:handleUpdate, onClearTx:handleClearTx, onSignOut:()=>setShowSignOut(true)})
  };

  return e('div',{className:'shell'},
    // Top bar (hidden on profile — profile has its own header)
    tab!=='profile' && e('div',{className:'topbar'},
      e('div',{className:'topbar-logo'},'My',e('span',null,'Budget')),
      e('div',{className:'topbar-avatar',onClick:()=>setTab('profile')},
        photo ? e('img',{src:photo,alt:'avatar'}) : e('span',null,initials)
      )
    ),
    e('div',{className:'page',style:tab==='profile'?{paddingTop:20}:undefined}, pages[tab]),
    e('nav',{className:'nav'},
      e('button',{className:'ni '+(tab==='home'?'on':''),   onClick:()=>setTab('home')},   IC.home, e('span',{className:'nl'},'Home')),
      e('button',{className:'ni '+(tab==='planner'?'on':''),onClick:()=>setTab('planner')},IC.plan, e('span',{className:'nl'},'Planner')),
      e('button',{className:'ni nadd',onClick:()=>setShowAdd(true)},IC.plus),
      e('button',{className:'ni '+(tab==='goals'?'on':''),  onClick:()=>setTab('goals')},  IC.goal, e('span',{className:'nl'},'Goals')),
      e('button',{className:'ni '+(tab==='log'?'on':''),    onClick:()=>setTab('log')},    IC.log,  e('span',{className:'nl'},'Log'))
    ),
    showAdd && e(AddDrawer,{onClose:()=>setShowAdd(false), onSave:handleSave}),
    showSignOut && e('div',{className:'ov-center'},
      e('div',{className:'modal'},
        e('div',{className:'modal-title'},'Sign Out'),
        e('div',{className:'modal-desc'},'This will clear your profile and reset to the setup screen. Your saved data will also be cleared.'),
        e('button',{className:'btn btn-red',style:{marginBottom:8},onClick:handleSignOut},'Sign Out'),
        e('button',{className:'btn btn-ghost',onClick:()=>setShowSignOut(false)},'Cancel')
      )
    )
  );
}

ReactDOM.render(e(App), document.getElementById('root'));

if ('serviceWorker' in navigator) {
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
